<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      background: #16213e;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { margin-bottom: 2rem; font-size: 1.6rem; color: #a8a8d8; }
    .problem {
      font-size: 3rem;
      font-weight: bold;
      margin: 1rem 0 2rem;
      letter-spacing: 4px;
    }
    input {
      font-size: 1.8rem;
      padding: 0.6rem 1.2rem;
      width: 180px;
      text-align: center;
      border: 2px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #eee;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e94560; }
    .btn {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0.7rem 2.5rem;
      font-size: 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: #c73650; }
    .result {
      margin-top: 1.5rem;
      font-size: 1.3rem;
      min-height: 2rem;
    }
    .correct { color: #4caf50; }
    .wrong { color: #f44336; }
    .stats { margin-top: 1.5rem; color: #888; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Multiplication Trainer</h1>
    <div class="problem" id="problem"></div>
    <input type="number" id="answer" placeholder="?" autofocus />
    <button class="btn" onclick="check()">Check</button>
    <div class="result" id="result"></div>
    <div class="stats" id="stats">Score: 0 / 0</div>
  </div>

  <script>
    let a, b, correct = 0, total = 0;

    function newProblem() {
      a = 100 + Math.floor(Math.random() * 900);
      b = 100 + Math.floor(Math.random() * 900);
      document.getElementById('problem').textContent = `${a} × ${b}`;
      document.getElementById('answer').value = '';
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = 'result';
      document.getElementById('answer').focus();
    }

    function check() {
      const input = document.getElementById('answer');
      const result = document.getElementById('result');
      const val = parseInt(input.value);
      if (isNaN(val)) { result.textContent = 'Enter a number'; return; }

      total++;
      if (val === a * b) {
        correct++;
        result.textContent = 'Correct!';
        result.className = 'result correct';
      } else {
        result.textContent = `Wrong — answer is ${a * b}`;
        result.className = 'result wrong';
      }
      document.getElementById('stats').textContent = `Score: ${correct} / ${total}`;
      setTimeout(newProblem, 1200);
    }

    document.getElementById('answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });

    newProblem();
  </script>
</body>
</html>
