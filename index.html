<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      background: #16213e;
      padding: 2.5rem 3.5rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      position: relative;
      z-index: 1;
    }
    h1 { margin-bottom: 0.5rem; font-size: 1.6rem; color: #a8a8d8; }
    .difficulty {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .diff-btn {
      padding: 0.4rem 1rem;
      border: 2px solid #333;
      border-radius: 6px;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .diff-btn.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }
    .diff-btn:hover { border-color: #e94560; }
    .timer-bar {
      width: 100%;
      height: 6px;
      background: #0f3460;
      border-radius: 3px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
      border-radius: 3px;
      transition: width 0.1s linear;
      width: 100%;
    }
    .timer-fill.pulse { animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .problem {
      font-size: 2.8rem;
      font-weight: bold;
      margin: 0.5rem 0 1.5rem;
      letter-spacing: 4px;
      transition: transform 0.1s;
    }
    .problem.shake {
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .problem.bounce {
      animation: bounce 0.4s;
    }
    @keyframes bounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    input {
      font-size: 1.8rem;
      padding: 0.6rem 1.2rem;
      width: 200px;
      text-align: center;
      border: 2px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #eee;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e94560; }
    .btn {
      display: block;
      margin: 1.2rem auto 0;
      padding: 0.6rem 2.5rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: #c73650; }
    .result {
      margin-top: 1rem;
      font-size: 1.3rem;
      min-height: 2rem;
    }
    .correct { color: #4caf50; }
    .wrong { color: #f44336; }
    .stats {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      font-size: 0.95rem;
      color: #888;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-val { font-size: 1.4rem; font-weight: bold; color: #eee; }
    .streak-fire {
      position: fixed;
      font-size: 3rem;
      pointer-events: none;
      z-index: 100;
      animation: flyUp 1s forwards;
    }
    @keyframes flyUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
    }
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 100;
      animation: confettiFall 1s forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(200px) rotate(720deg); }
    }
    .combo-text {
      font-size: 1.2rem;
      font-weight: bold;
      min-height: 1.5rem;
      margin-top: 0.5rem;
    }
    .high-score {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="high-score">Best: <span id="highScore">0</span></div>
    <h1>Multiplication Trainer</h1>
    <div class="difficulty">
      <button class="diff-btn" onclick="setDiff('easy')">Easy (2d)</button>
      <button class="diff-btn active" onclick="setDiff('med')">Medium (3d)</button>
      <button class="diff-btn" onclick="setDiff('hard')">Hard (4d)</button>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
    <div class="problem" id="problem"></div>
    <div class="combo-text" id="combo"></div>
    <input type="number" id="answer" placeholder="?" autofocus />
    <button class="btn" onclick="check()">Check</button>
    <div class="result" id="result"></div>
    <div class="stats">
      <div class="stat-item"><span class="stat-val" id="scoreVal">0</span>Score</div>
      <div class="stat-item"><span class="stat-val" id="streakVal">0</span>Streak</div>
      <div class="stat-item"><span class="stat-val" id="accuracyVal">0%</span>Accuracy</div>
    </div>
  </div>

  <script>
    let a, b, correct = 0, total = 0, streak = 0, highScore = 0;
    let timerInterval, timeLeft, maxTime = 20;
    let diff = 'med';

    const sounds = {
      correct: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdH2DgYF8eH2ChYaGg4B6eHl+g4WFhIF9eXl+g4WEhIF9eXh+goODhIB9enh+gYKDhIB9enh+gYKDhIB+enh+gYKCg4B9enh+gYKCg4B+enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B+enh+gYKCg4B9enh+gYKCg4B+enh+gYKCg4B+enh+gYKCg4A='),
      wrong: new Audio('data:audio/wav;base64,UklGRl4GAABXQVZFZm10IBAAAAABAAEARK4AAIhYAAACABAAZGF0YToGAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgA=='),
      streak: new Audio('data:audio/wav;base64,UklGRnYGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU4GAAB+hYqFbF1fdH2DgYF8eH2ChYaGg4B5eHl+g4aEhIF9eXh+gYODhIB9enh+goODhIB9enh+goODhIB9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4B9enh+gYKCg4A=')
    };

    const diffRanges = { easy: [10, 90], med: [100, 900], hard: [1000, 9000] };
    const diffTimes = { easy: 15, med: 20, hard: 30 };

    function setDiff(d) {
      diff = d;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      newProblem();
    }

    function newProblem() {
      const [lo, hi] = diffRanges[diff];
      a = lo + Math.floor(Math.random() * (hi - lo + 1));
      b = lo + Math.floor(Math.random() * (hi - lo + 1));
      document.getElementById('problem').textContent = `${a} × ${b}`;
      document.getElementById('answer').value = '';
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = 'result';
      document.getElementById('combo').textContent = streak >= 3 ? `🔥 ${streak}x streak! +${streak} bonus` : '';
      document.getElementById('answer').focus();
      startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval);
      maxTime = diffTimes[diff];
      timeLeft = maxTime;
      const fill = document.getElementById('timerFill');
      fill.style.width = '100%';
      fill.classList.remove('pulse');
      timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        const pct = Math.max(0, (timeLeft / maxTime) * 100);
        fill.style.width = pct + '%';
        if (pct < 30) fill.classList.add('pulse');
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timeUp();
        }
      }, 100);
    }

    function timeUp() {
      streak = 0;
      total++;
      const el = document.getElementById('problem');
      el.classList.add('shake');
      setTimeout(() => el.classList.remove('shake'), 400);
      document.getElementById('result').textContent = `⏰ Time's up! Answer: ${a * b}`;
      document.getElementById('result').className = 'result wrong';
      updateStats();
      setTimeout(newProblem, 1500);
    }

    function check() {
      clearInterval(timerInterval);
      const input = document.getElementById('answer');
      const result = document.getElementById('result');
      const val = parseInt(input.value);
      if (isNaN(val)) { result.textContent = 'Enter a number'; return; }

      total++;
      const el = document.getElementById('problem');
      const timeBonus = Math.floor((timeLeft / maxTime) * 5);
      let points = 1;

      if (val === a * b) {
        correct++;
        streak++;
        points = 1 + streak + timeBonus;
        if (streak >= 3) { sounds.streak.play(); spawnConfetti(); }
        else { sounds.correct.play(); }
        el.classList.add('bounce');
        setTimeout(() => el.classList.remove('bounce'), 400);
        result.textContent = `✅ Correct! +${points} pts${timeBonus ? ` (⏱+${timeBonus})` : ''}`;
        result.className = 'result correct';
        if (streak >= 3) spawnFire();
      } else {
        streak = 0;
        sounds.wrong.play();
        el.classList.add('shake');
        setTimeout(() => el.classList.remove('shake'), 400);
        result.textContent = `❌ Wrong — answer is ${a * b}`;
        result.className = 'result wrong';
      }

      document.getElementById('combo').textContent = streak >= 3 ? `🔥 ${streak}x streak! +${streak} bonus` : streak > 0 ? `${streak} in a row` : '';
      updateStats();
      setTimeout(newProblem, 1200);
    }

    function updateStats() {
      document.getElementById('scoreVal').textContent = correct;
      document.getElementById('streakVal').textContent = streak;
      document.getElementById('accuracyVal').textContent = total ? Math.round((correct / total) * 100) + '%' : '0%';
      if (correct > highScore) { highScore = correct; document.getElementById('highScore').textContent = highScore; }
    }

    function spawnFire() {
      for (let i = 0; i < 3; i++) {
        const el = document.createElement('div');
        el.className = 'streak-fire';
        el.textContent = '🔥';
        el.style.left = (30 + Math.random() * 40) + '%';
        el.style.top = (50 + Math.random() * 20) + '%';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }
    }

    function spawnConfetti() {
      const colors = ['#e94560','#4caf50','#ffeb3b','#2196f3','#ff9800'];
      for (let i = 0; i < 20; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.left = (20 + Math.random() * 60) + '%';
        el.style.top = (30 + Math.random() * 30) + '%';
        el.style.animationDelay = (Math.random() * 0.3) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1200);
      }
    }

    document.getElementById('answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });

    newProblem();
  </script>
</body>
</html>
